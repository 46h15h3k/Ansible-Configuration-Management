---
# roles/nginx/tasks/main.yml
# Installs nginx, deploys a minimal server block for the static site,
# opens the firewall, and ensures the service is running.

- name: Install nginx (Debian/Ubuntu)
  apt:
    name: nginx
    state: present
  when: ansible_os_family == "Debian"

- name: Install nginx (RHEL/Amazon Linux)
  dnf:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"

- name: Deploy nginx server block
  template:
    src: nginx.conf.j2
    dest: "{{ '/etc/nginx/sites-available/default' if ansible_os_family == 'Debian' else '/etc/nginx/conf.d/default.conf' }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart nginx

- name: Enable site (Debian/Ubuntu symlink)
  file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
    force: true
  when: ansible_os_family == "Debian"
  notify: restart nginx

- name: Allow HTTP through ufw (Debian/Ubuntu)
  community.general.ufw:
    rule: allow
    port: "{{ nginx_listen_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"
  ignore_errors: true   # ufw may be inactive; the cloud Security Group is the real gate

- name: Allow HTTP through firewalld (RHEL/Amazon Linux)
  ansible.posix.firewalld:
    service: http
    permanent: true
    state: enabled
    immediate: true
  when: ansible_os_family == "RedHat"
  ignore_errors: true   # firewalld may not be installed on minimal AMIs

- name: Ensure nginx is enabled and running
  service:
    name: nginx
    state: started
    enabled: true

- name: Remove Debian's default landing page (if present, so our site shows)
  file:
    path: /var/www/html/index.nginx-debian.html
    state: absent
