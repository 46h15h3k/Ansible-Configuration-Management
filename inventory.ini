; inventory.ini
; Replace the IP/hostname, ansible_user, and key path with your own server's
; details. This matches the EC2 / DigitalOcean droplet you already have
; running from the earlier projects.

[webservers]
web1 ansible_host=<ec2-public-ip> ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/ec2-key.pem

[webservers:vars]
ansible_python_interpreter=/usr/bin/python3
